<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
        .back-btn:hover { background: #545b62; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #495057; }
        input[type="text"] {
            width: 100%; padding: 10px 12px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 1em; box-sizing: border-box;
            font-family: inherit;
        }
        input:focus {
            outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }
        .field-error { border-color: #e74c3c !important; }
        .error-msg { color: #e74c3c; font-size: 0.85em; margin-top: 5px; display: block; }
        .btn-submit { background: #4a90d9; color: white; border: none; padding: 12px 32px; font-size: 1em; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background: #357abd; }
        .required { color: #e74c3c; }
        footer { margin-top: 28px; padding-top: 12px; border-top: 1px solid #ddd; font-size: 0.95em; color: #555; }
    </style>
</head>
<body>

    <h1>새 카테고리 등록</h1>

    <a class="back-btn" th:href="@{/categories}">← 카테고리 목록으로 돌아가기</a>

    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div class="form-group">
            <label for="name">
                카테고리 이름 <span class="required">*</span>
            </label>
            <input type="text"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'field-error'"
                   placeholder="카테고리 이름을 입력하세요" />
            <span class="error-msg"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}">카테고리 이름 오류</span>
        </div>

        <div class="form-group">
            <button type="submit" class="btn-submit">카테고리 등록</button>
        </div>
    </form>

    <footer>
        <span id="practice-info"></span>
    </footer>

    <script>
        const practiceInfo = document.getElementById('practice-info');
        const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

        function pad(value) {
            return String(value).padStart(2, '0');
        }

        function updatePracticeInfo() {
            const now = new Date();
            const meridiem = now.getHours() < 12 ? '오전' : '오후';
            const hour12 = now.getHours() % 12 || 12;

            practiceInfo.textContent =
                `실습 수행 일시: ${now.getFullYear()} 년 ${pad(now.getMonth() + 1)} 월 ${pad(now.getDate())} 일 ` +
                `(${weekdays[now.getDay()]}) ${meridiem} ${pad(hour12)}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ` +
                `| 학번: 2071027 | 성명: 차재혁`;
        }

        updatePracticeInfo();
        setInterval(updatePracticeInfo, 1000);
    </script>

</body>
</html>
